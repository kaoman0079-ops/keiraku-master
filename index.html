<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>経穴マスター Pro 辞典 - 連続表示版</title>
    <style>
        :root {
            --main-blue: #007AFF;
            --bg-light: #F2F2F7;
            --card-bg: #FFFFFF;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg-light); margin: 0; padding: 0 15px; color: #1C1C1E; }
        
        /* ヘッダー固定：常に操作可能 */
        .header { 
            position: sticky; top: 0; background: var(--bg-light); padding: 10px 0; z-index: 1000; border-bottom: 2px solid #D1D1D6; 
        }
        .controls { display: flex; flex-direction: column; gap: 8px; }
        #search-box {
            width: 100%; padding: 12px 15px; border-radius: 12px; border: 2px solid #C6C6C8;
            background: #FFF; font-size: 1.1rem; outline: none; box-sizing: border-box;
        }

        /* 経絡選択：場所を取りすぎないよう開閉式 */
        .menu-toggle {
            width: 100%; padding: 8px; background: #8E8E93; color: #FFF; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
        }
        .filter-section {
            background: #E5E5EA; border-radius: 12px; padding: 8px; margin-top: 8px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 5px;
        }
        .filter-section.hidden { display: none; }
        .filter-btn { padding: 10px 4px; border-radius: 6px; background: #FFF; border: none; font-size: 0.7rem; font-weight: bold; cursor: pointer; }
        .filter-btn.active { background: var(--main-blue); color: #FFF; }

        /* リスト表示 */
        .list-container { margin-top: 15px; padding-bottom: 100px; }
        .item-card {
            background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1); border-left: 5px solid var(--main-blue); cursor: pointer;
        }
        .name { font-size: 1.2rem; font-weight: 800; }
        .ruby { font-size: 0.8rem; color: #636366; }
        .meta-info { font-size: 0.9rem; color: var(--main-blue); font-weight: bold; margin: 4px 0; }
        .pos-preview { font-size: 0.9rem; color: #3A3A3C; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* 特大カード（モーダル） */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 2000; display: none;
            justify-content: center; align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .big-card {
            background: #FFF; width: 90%; max-width: 500px; border-radius: 20px;
            padding: 20px; position: relative; max-height: 85vh; overflow-y: auto;
        }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 1.5rem; border: none; background: none; color: #8E8E93; cursor: pointer; }

        /* 特大カード内のナビゲーション（矢印） */
        .nav-buttons {
            display: flex; justify-content: space-between; margin-top: 20px; padding: 10px 0;
            position: sticky; bottom: 0; background: #FFF; border-top: 1px solid #F2F2F7;
        }
        .nav-btn {
            background: var(--main-blue); color: #FFF; border: none; padding: 12px 25px;
            border-radius: 10px; font-weight: bold; font-size: 1.2rem; cursor: pointer;
        }
        .nav-btn:disabled { background: #C6C6C8; cursor: default; }

        .big-name { font-size: 2rem; font-weight: 900; display: block; }
        .big-detail { margin-top: 15px; font-size: 1.1rem; line-height: 1.6; border-top: 1px solid #F2F2F7; padding-top: 10px; }
        .big-label { color: var(--main-blue); font-weight: bold; font-size: 0.8rem; display: block; }
    </style>
</head>
<body>

    <div class="header">
        <h1>📍 経穴マスター Pro</h1>
        <div class="controls">
            <input type="text" id="search-box" placeholder="キーワード検索..." oninput="updateList()">
            <button class="menu-toggle" onclick="toggleMenu()">経絡を選択して絞り込む</button>
            <div class="filter-section hidden" id="filter-area">
                <button class="filter-btn" style="grid-column: span 2;" onclick="setFilter('すべて')">すべて表示</button>
                <button class="filter-btn" onclick="setFilter('督脈')">督脈</button>
                <button class="filter-btn" onclick="setFilter('任脈')">任脈</button>
                <button class="filter-btn" onclick="setFilter('手の太陰肺経')">手の太陰肺経</button>
                <button class="filter-btn" onclick="setFilter('手の陽明大腸経')">手の陽明大腸経</button>
                <button class="filter-btn" onclick="setFilter('足の陽明胃経')">足の陽明胃経</button>
                <button class="filter-btn" onclick="setFilter('足の太陰脾経')">足の太陰脾経</button>
                <button class="filter-btn" onclick="setFilter('手の少陰心経')">手の少陰心経</button>
                <button class="filter-btn" onclick="setFilter('手の太陽小腸経')">手の太陽小腸経</button>
                <button class="filter-btn" onclick="setFilter('足の太陽膀胱経')">足の太陽膀胱経</button>
                <button class="filter-btn" onclick="setFilter('足の少陰腎経')">足の少陰腎経</button>
                <button class="filter-btn" onclick="setFilter('手の厥陰心包経')">手の厥陰心包経</button>
                <button class="filter-btn" onclick="setFilter('手の少陽三焦経')">手の少陽三焦経</button>
                <button class="filter-btn" onclick="setFilter('足の少陽胆経')">足の少陽胆経</button>
                <button class="filter-btn" onclick="setFilter('足の厥陰肝経')">足の厥陰肝経</button>
            </div>
        </div>
    </div>

    <div id="count-display" style="text-align:center; font-size:0.8rem; color:#8E8E93; margin-top:10px;"></div>
    <div id="list-container" class="list-container"></div>

    <div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
        <div class="big-card" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeModal()">✕</button>
            <span class="big-name" id="modal-name"></span>
            <span id="modal-ruby" style="color:#636366;"></span>
            <div id="modal-meridian" style="color:var(--main-blue); font-weight:bold; margin:10px 0;"></div>
            
            <div class="big-detail"><span class="big-label">📍 部位</span><div id="modal-pos"></div></div>
            <div class="big-detail"><span class="big-label">🖐️ 取穴法</span><div id="modal-method"></div></div>
            <div class="big-detail"><span class="big-label">🦴 解剖</span><div id="modal-anatomy"></div></div>
            <div class="big-detail" id="modal-note-row"><span class="big-label">📝 備考</span><div id="modal-note"></div></div>

            <div class="nav-buttons">
                <button class="nav-btn" id="prev-btn" onclick="navigateCard(-1)">◀ 前へ</button>
                <button class="nav-btn" id="next-btn" onclick="navigateCard(1)">次へ ▶</button>
            </div>
        </div>
    </div>

<script>
let masterData = [];
let filteredIndices = []; // 現在表示されているリストのインデックス
let currentCardPointer = 0; // 特大カードで何番目を表示しているか

window.onload = async function() {
    try {
        const res = await fetch('data1.csv?v=' + Date.now());
        masterData = parseCSV(await res.text());
        updateList(); // 初期状態で全件表示
    } catch (e) { document.getElementById('count-display').innerText = "読み込み失敗"; }
};

function parseCSV(text) {
    const lines = text.trim().split(/\r?\n/);
    const headers = lines[0].split(lines[0].includes('\t') ? '\t' : ',').map(h => h.trim().replace(/^"|"$/g, ''));
    return lines.slice(1).map(line => {
        const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
        let obj = {};
        headers.forEach((h, i) => obj[h] = (values[i] || "").trim().replace(/^"|"$/g, '').replace(/""/g, '"'));
        return obj;
    }).filter(i => i.経穴名);
}

function toggleMenu() { document.getElementById('filter-area').classList.toggle('hidden'); }

let currentFilter = "すべて";
function setFilter(ch) {
    currentFilter = ch;
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.toggle('active', btn.innerText === ch));
    toggleMenu();
    updateList();
}

function updateList() {
    const word = document.getElementById('search-box').value.toLowerCase();
    const container = document.getElementById('list-container');
    
    // 現在の検索・フィルタ条件に合うデータのインデックスを記録
    filteredIndices = [];
    masterData.forEach((item, index) => {
        const matchFilter = (currentFilter === "すべて" || item.所属経絡 === currentFilter);
        const matchWord = (!word || item.経穴名.includes(word) || item.読み.includes(word) || item.部位.includes(word) || item['備考（属性タグ・別説含む）'].includes(word));
        if (matchFilter && matchWord) filteredIndices.push(index);
    });

    document.getElementById('count-display').innerText = `該当: ${filteredIndices.length} 件`;
    container.innerHTML = filteredIndices.map((masterIdx, pointer) => {
        const i = masterData[masterIdx];
        return `
            <div class="item-card" onclick="openModal(${pointer})">
                <div class="item-header">
                    <span class="name">${i.経穴名}</span>
                    <span class="ruby"> ${i.読み}</span>
                </div>
                <div class="meta-info">${i.所属経絡}</div>
                <div class="pos-preview">${i.部位}</div>
            </div>`;
    }).join('');
}

function openModal(pointer) {
    currentCardPointer = pointer;
    const item = masterData[filteredIndices[pointer]];
    
    document.getElementById('modal-name').innerText = item.経穴名;
    document.getElementById('modal-ruby').innerText = item.読み;
    document.getElementById('modal-meridian').innerText = item.所属経絡;
    document.getElementById('modal-pos').innerText = item.部位;
    document.getElementById('modal-method').innerText = item['取穴法（指標）'];
    document.getElementById('modal-anatomy').innerText = item.解剖;
    document.getElementById('modal-note').innerText = item['備考（属性タグ・別説含む）'] || "なし";
    
    document.getElementById('prev-btn').disabled = (pointer === 0);
    document.getElementById('next-btn').disabled = (pointer === filteredIndices.length - 1);
    
    document.getElementById('modal-overlay').classList.add('active');
    document.body.style.overflow = 'hidden';
}

function navigateCard(step) {
    const newPointer = currentCardPointer + step;
    if (newPointer >= 0 && newPointer < filteredIndices.length) {
        openModal(newPointer);
    }
}

function closeModal() {
    document.getElementById('modal-overlay').classList.remove('active');
    document.body.style.overflow = '';
}
</script>
</body>
</html>
