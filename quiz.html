<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>経絡マスター Pro - Level System</title>
    <style>
        :root { --main-blue: #3498db; --bg-color: #f0f2f5; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-color); padding: 20px; max-width: 800px; margin: 0 auto; color: #333; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { text-align: center; color: #2c3e50; font-size: 1.5rem; margin-top: 0; }
        .level-selector { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .level-btn { padding: 8px 15px; border: 2px solid #ddd; border-radius: 20px; background: white; cursor: pointer; font-size: 0.9rem; }
        .level-btn.active { background: var(--main-blue); color: white; border-color: var(--main-blue); }
        .quiz-info { color: #7f8c8d; margin-bottom: 15px; text-align: center; font-size: 0.9rem; }
        .question { font-size: 1.3rem; font-weight: bold; margin-bottom: 20px; text-align: center; line-height: 1.4; }
        .option-btn { 
            display: block; width: 100%; padding: 16px; margin: 10px 0; 
            border: 2px solid #e0e6ed; border-radius: 12px; background: white;
            font-size: 1rem; cursor: pointer; text-align: left; transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .option-btn:hover { background: #f8f9fa; border-color: var(--main-blue); }
        .correct { background: #e8f5e9 !important; border-color: #4caf50 !important; color: #2e7d32; font-weight: bold; }
        .wrong { background: #ffebee !important; border-color: #ef5350 !important; color: #c62828; }
        #next-btn { 
            display: none; width: 100%; padding: 18px; background: var(--main-blue); 
            color: white; border: none; border-radius: 12px; font-size: 1.1rem; cursor: pointer; margin-top: 10px;
        }
        .explanation { display: none; margin-top: 20px; padding: 15px; background: #fff9db; border-radius: 10px; font-size: 0.95rem; line-height: 1.6; border-left: 5px solid #f1c40f; }
        .status { text-align: center; color: #7f8c8d; }
    </style>
</head>
<body>

    <div class="card">
        <h1>📍 経絡マスター Pro</h1>
        
        <div class="level-selector" id="level-selector">
            <button class="level-btn active" onclick="setLevel(1)">Lv.1 基礎</button>
            <button class="level-btn" onclick="setLevel(2)">Lv.2 経絡</button>
            <button class="level-btn" onclick="setLevel(3)">Lv.3 部位</button>
        </div>

        <div id="loader" class="status">データを読み込み中...</div>
        
        <div id="quiz-area" style="display:none;">
            <div class="quiz-info" id="quiz-progress"></div>
            <div class="question" id="question-text"></div>
            <div id="options-container"></div>
            <div id="explanation-box" class="explanation"></div>
            <button id="next-btn" onclick="nextQuestion()">次の問題へ ➔</button>
        </div>
    </div>

<script>
let masterData = [];
let quizQueue = [];
let totalSolved = 0;
let currentLevel = 1;

window.onload = async function() {
    try {
        const response = await fetch('data1.csv?v=' + new Date().getTime());
        const csvText = await response.text();
        masterData = parseCSV(csvText);
        if (masterData.length > 0) startQuiz();
    } catch (e) {
        document.getElementById('loader').innerHTML = "⚠️ データの読み込みに失敗しました。";
    }
};

function setLevel(lv) {
    currentLevel = lv;
    document.querySelectorAll('.level-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i + 1 === lv);
    });
    totalSolved = 0;
    refreshQueue();
    showQuestion();
}

function parseCSV(text) {
    const lines = text.trim().split(/\r?\n/);
    if (lines.length < 2) return [];
    const delimiter = lines[0].includes('\t') ? '\t' : ',';
    const headers = lines[0].split(delimiter).map(h => h.trim().replace(/^"|"$/g, ''));
    return lines.slice(1).map(line => {
        const regex = delimiter === ',' ? /,(?=(?:(?:[^"]*"){2})*[^"]*$)/ : delimiter;
        const values = line.split(regex);
        let obj = {};
        headers.forEach((h, i) => {
            let val = values[i] ? values[i].trim().replace(/^"|"$/g, '').replace(/""/g, '"') : "";
            obj[h] = val;
        });
        return obj;
    }).filter(item => item['経穴名']);
}

function startQuiz() {
    refreshQueue();
    document.getElementById('loader').style.display = 'none';
    document.getElementById('quiz-area').style.display = 'block';
    showQuestion();
}

function refreshQueue() {
    quizQueue = [...masterData].sort(() => Math.random() - 0.5);
}

function showQuestion() {
    if (quizQueue.length === 0) refreshQueue();
    const q = quizQueue[0];
    totalSolved++;
    
    document.getElementById('quiz-progress').innerText = `Lv.${currentLevel} - 第 ${totalSolved} 問目`;
    document.getElementById('question-text').innerText = `${q['経穴名']} (${q['読み']}) の部位は？`;
    
    const container = document.getElementById('options-container');
    container.innerHTML = '';

    // レベルに応じた選択肢生成
    let options = [q['部位']];
    let pool = [];

    if (currentLevel === 1) {
        pool = masterData;
    } else if (currentLevel === 2) {
        // 同じ経絡のデータから選ぶ
        pool = masterData.filter(item => item['所属経絡'] === q['所属経絡']);
        if (pool.length < 4) pool = masterData; // 足りない場合は全データ
    } else if (currentLevel === 3) {
        // 部位の最初の2文字が一致するデータから選ぶ（例：側頭、顔面、下腿）
        const areaPrefix = q['部位'].substring(0, 2);
        pool = masterData.filter(item => item['部位'].startsWith(areaPrefix));
        if (pool.length < 4) pool = masterData;
    }

    while(options.length < 4) {
        let randomVal = pool[Math.floor(Math.random() * pool.length)]['部位'];
        if(randomVal && !options.includes(randomVal)) options.push(randomVal);
    }
    options.sort(() => Math.random() - 0.5);

    options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(opt, btn, q['部位']);
        container.appendChild(btn);
    });

    document.getElementById('explanation-box').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
}

function checkAnswer(selected, btn, correct) {
    const btns = document.querySelectorAll('.option-btn');
    btns.forEach(b => b.disabled = true);
    if(selected === correct) {
        btn.classList.add('correct');
    } else {
        btn.classList.add('wrong');
        btns.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
    }
    const q = quizQueue[0];
    const exp = document.getElementById('explanation-box');
    exp.style.display = 'block';
    exp.innerHTML = `<strong>【正解：${q['経穴名']}】</strong><br>` +
                    `📍 部位：${q['部位']}<br>` +
                    `🔍 取穴法：${q['取穴法（指標）'] || 'なし'}<br>` +
                    `🦴 解剖：${q['解剖'] || 'なし'}<br>` +
                    `📝 備考：${q['備考（属性タグ・別説含む）'] || 'なし'}`;
    document.getElementById('next-btn').style.display = 'block';
}

function nextQuestion() {
    quizQueue.shift();
    showQuestion();
}
</script>
</body>
</html>
